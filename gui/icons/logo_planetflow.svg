<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 0 585 140">
  <defs>
    <!-- Planet base: warm ochre core → deep brown limb (radial) -->
    <radialGradient id="pg" cx="38%" cy="30%" r="66%">
      <stop offset="0%"   stop-color="#f5e2a8"/>
      <stop offset="18%"  stop-color="#d4943a"/>
      <stop offset="48%"  stop-color="#9a5220"/>
      <stop offset="82%"  stop-color="#6b3210"/>
      <stop offset="100%" stop-color="#471c06"/>
    </radialGradient>

    <!--
      Atmospheric band overlay (vertical linear gradient, userSpaceOnUse).
      Applied to a second <circle> on top of the base gradient.
      Transparent gaps let the base radial gradient show through.
      No clipPath needed — the gradient is inherently bounded by the circle's shape.
      Planet top y=8, bottom y=132, range=124px.
      Offset = (y - 8) / 124 * 100%
    -->
    <linearGradient id="bg" x1="0" y1="8" x2="0" y2="132" gradientUnits="userSpaceOnUse">
      <!-- N polar (0–3.2%, y=8–12) -->
      <stop offset="0%"    stop-color="#6a4020" stop-opacity="0.40"/>
      <stop offset="3.2%"  stop-color="#6a4020" stop-opacity="0.40"/>
      <!-- Band 1: dark belt (3.2–11.3%, y=12–22) -->
      <stop offset="3.2%"  stop-color="#7a4820" stop-opacity="0.50"/>
      <stop offset="11.3%" stop-color="#7a4820" stop-opacity="0.50"/>
      <!-- Gap (11.3–12.9%, y=22–24) -->
      <stop offset="11.3%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="12.9%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- Band 2: ochre (12.9–18.5%, y=24–31) -->
      <stop offset="12.9%" stop-color="#c89048" stop-opacity="0.44"/>
      <stop offset="18.5%" stop-color="#c89048" stop-opacity="0.44"/>
      <!-- Gap (18.5–20.2%, y=31–33) -->
      <stop offset="18.5%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="20.2%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- Band 3: NEB dark (20.2–31.5%, y=33–47) -->
      <stop offset="20.2%" stop-color="#572c10" stop-opacity="0.68"/>
      <stop offset="31.5%" stop-color="#572c10" stop-opacity="0.68"/>
      <!-- Gap (31.5–33.1%, y=47–49) -->
      <stop offset="31.5%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="33.1%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- Band 4: EZ light ochre (33.1–46.0%, y=49–65) -->
      <stop offset="33.1%" stop-color="#e8c07a" stop-opacity="0.37"/>
      <stop offset="46.0%" stop-color="#e8c07a" stop-opacity="0.37"/>
      <!-- Band 5: SEB dark (46.0–57.3%, y=65–79, no gap from Band 4) -->
      <stop offset="46.0%" stop-color="#693414" stop-opacity="0.72"/>
      <stop offset="57.3%" stop-color="#693414" stop-opacity="0.72"/>
      <!-- Band 6: STZ ochre (57.3–64.5%, y=79–88, no gap from Band 5) -->
      <stop offset="57.3%" stop-color="#d49d48" stop-opacity="0.44"/>
      <stop offset="64.5%" stop-color="#d49d48" stop-opacity="0.44"/>
      <!-- Gap (64.5–66.1%, y=88–90) -->
      <stop offset="64.5%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="66.1%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- Band 7: STB (66.1–72.6%, y=90–98) -->
      <stop offset="66.1%" stop-color="#8a4818" stop-opacity="0.58"/>
      <stop offset="72.6%" stop-color="#8a4818" stop-opacity="0.58"/>
      <!-- Gap (72.6–74.2%, y=98–100) -->
      <stop offset="72.6%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="74.2%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- Band 8: SSTB (74.2–87.1%, y=100–116) -->
      <stop offset="74.2%" stop-color="#573016" stop-opacity="0.60"/>
      <stop offset="87.1%" stop-color="#573016" stop-opacity="0.60"/>
      <!-- Gap (87.1–88.7%, y=116–118) -->
      <stop offset="87.1%" stop-color="#c0a060" stop-opacity="0"/>
      <stop offset="88.7%" stop-color="#c0a060" stop-opacity="0"/>
      <!-- S polar (88.7–100%, y=118–132) -->
      <stop offset="88.7%" stop-color="#471c06" stop-opacity="0.50"/>
      <stop offset="100%"  stop-color="#471c06" stop-opacity="0.50"/>
    </linearGradient>

    <!-- Atmospheric warm rim glow -->
    <radialGradient id="ag" cx="50%" cy="50%" r="50%">
      <stop offset="78%"  stop-color="#c07820" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c07820" stop-opacity="0.28"/>
    </radialGradient>
    <!-- Ring fade at edges -->
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c0a068" stop-opacity="0.02"/>
      <stop offset="22%"  stop-color="#c0a068" stop-opacity="0.62"/>
      <stop offset="78%"  stop-color="#c0a068" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#c0a068" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Primary flow line -->
    <linearGradient id="f1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4da6ff" stop-opacity="0.05"/>
      <stop offset="38%"  stop-color="#4da6ff" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#7ec8ff" stop-opacity="0.65"/>
    </linearGradient>
    <!-- Secondary flow lines -->
    <linearGradient id="f2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4da6ff" stop-opacity="0.03"/>
      <stop offset="38%"  stop-color="#4da6ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7ec8ff" stop-opacity="0.42"/>
    </linearGradient>
  </defs>

  <!-- ── Ring: back arc (top half, behind planet) ── -->
  <path d="M -22 70 A 92 19 0 0 0 162 70"
        fill="none" stroke="url(#rg)" stroke-width="5" opacity="0.5"/>

  <!-- ── Planet: base radial gradient (spherical shading) ── -->
  <circle cx="70" cy="70" r="62" fill="url(#pg)"/>

  <!-- ── Planet: atmospheric band overlay (linear gradient, no clipPath) ── -->
  <circle cx="70" cy="70" r="62" fill="url(#bg)"/>

  <!-- ── Great Red Spot (naturally within planet bounds, no clipPath needed) ── -->
  <ellipse cx="46" cy="72" rx="15"  ry="8"   fill="#8a200e" opacity="0.88"/>
  <ellipse cx="46" cy="72" rx="9.5" ry="4.8" fill="#a8281a" opacity="0.72"/>
  <ellipse cx="44" cy="71" rx="4.5" ry="2.5" fill="#c03025" opacity="0.48"/>

  <!-- ── Specular highlight (upper-left light source, low opacity) ── -->
  <ellipse cx="50" cy="36" rx="28" ry="18" fill="white" opacity="0.055"/>

  <!-- ── Atmospheric glow rim ── -->
  <circle cx="70" cy="70" r="62" fill="url(#ag)"/>

  <!-- ── Ring: front arc (bottom half, in front of planet) ── -->
  <path d="M -22 70 A 92 19 0 0 1 162 70"
        fill="none" stroke="url(#rg)" stroke-width="5" opacity="0.68"/>

  <!-- ── Data-flow pipeline lines ── -->
  <path d="M 135 51 C 170 47 212 45 258 44"
        stroke="url(#f2)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="254,39.5 263,44 254,48.5" fill="#4da6ff" opacity="0.60"/>
  <path d="M 132 70 C 175 70 222 70 272 70"
        stroke="url(#f1)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <polygon points="268,65.5 278,70 268,74.5" fill="#4da6ff" opacity="0.88"/>
  <path d="M 135 89 C 170 93 212 95 258 96"
        stroke="url(#f2)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <polygon points="254,91.5 263,96 254,100.5" fill="#4da6ff" opacity="0.60"/>

  <!-- Pipeline node dots -->
  <circle cx="186" cy="45"  r="3"   fill="#4da6ff" opacity="0.54"/>
  <circle cx="228" cy="44"  r="2"   fill="#4da6ff" opacity="0.38"/>
  <circle cx="196" cy="70"  r="3.5" fill="#4da6ff" opacity="0.78"/>
  <circle cx="242" cy="70"  r="2.5" fill="#4da6ff" opacity="0.58"/>
  <circle cx="190" cy="95"  r="3"   fill="#4da6ff" opacity="0.50"/>
  <circle cx="230" cy="96"  r="2"   fill="#4da6ff" opacity="0.36"/>

  <!-- Wordmark: two <text> elements with fill on the element itself (Qt SVG safe) -->
  <text x="437" y="92"
        text-anchor="end"
        font-family="Arial,sans-serif"
        font-size="48"
        font-weight="bold"
        fill="white">Planet</text>
  <text x="445" y="92"
        text-anchor="start"
        font-family="Arial,sans-serif"
        font-size="48"
        font-weight="bold"
        fill="#4da6ff">Flow</text>
</svg>
