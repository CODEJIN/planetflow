<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>

  <!-- Stars -->
  <circle cx="10" cy="12" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="54" cy="8"  r="0.9" fill="white" opacity="0.6"/>
  <circle cx="58" cy="22" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="6"  cy="44" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="14" cy="52" r="1.0" fill="white" opacity="0.6"/>
  <circle cx="52" cy="50" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="48" cy="14" r="0.7" fill="white" opacity="0.5"/>

  <!-- Saturn ring (tilted ellipse, clipped) -->
  <ellipse cx="32" cy="32" rx="24" ry="7" fill="none"
           stroke="#c8a96e" stroke-width="3.5" opacity="0.85"/>

  <!-- Planet body -->
  <circle cx="32" cy="32" r="13" fill="#e8c16a"/>

  <!-- Planet shading / bands -->
  <ellipse cx="32" cy="28" rx="13" ry="4" fill="#d4a84a" opacity="0.5"/>
  <ellipse cx="32" cy="36" rx="13" ry="3" fill="#c89640" opacity="0.4"/>

  <!-- Limb darkening -->
  <circle cx="32" cy="32" r="13" fill="none"
          stroke="#8a5a10" stroke-width="1.5" opacity="0.3"/>

  <!-- Ring occluded by planet — white cap to hide ring behind planet -->
  <circle cx="32" cy="32" r="13" fill="#1a1a2e" opacity="0"/>
  <!-- Front ring arc (in front of planet) -->
  <path d="M 8 32 Q 20 39 32 39 Q 44 39 56 32" fill="none"
        stroke="#c8a96e" stroke-width="3.5" opacity="0.85"/>
</svg>
